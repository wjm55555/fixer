name: tier2-3

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch: {}

jobs:
  tier2:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install
        run: bun install
      - name: Run tier2
        run: FIXER_TIER=2 bun test
  tier3:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install
        run: bun install
      - name: Run tier3
        run: FIXER_TIER=3 bun test
