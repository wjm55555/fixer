name: tier1

on:
  push:
    paths:
      - "src/**"
      - "test/**"
      - "cases/**"
      - "package.json"
      - "tsconfig.json"
      - ".github/workflows/tier1.yml"
  pull_request:
    paths:
      - "src/**"
      - "test/**"
      - "cases/**"
      - "package.json"
      - "tsconfig.json"
      - ".github/workflows/tier1.yml"

jobs:
  tier1:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install
        run: bun install
      - name: Run tier1
        run: bun test
